name: Reusable - Build API

on:
  workflow_call:

jobs:
  build:
    name: Restore & build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PandaBattleship.API/PandaBattleship.API.csproj

      - name: Build
        run: dotnet build PandaBattleship.API/PandaBattleship.API.csproj --no-restore --configuration Release
